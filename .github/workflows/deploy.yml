name: Deploy to Cloudflare

on:
  push:
    branches:
      - master
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to ${{ github.event.inputs.environment || (github.ref == 'refs/heads/master' && 'production' || 'staging') }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6.0.3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.environment }}" = "production" ]; then
              echo "CLOUDFLARE_ENV=" >> $GITHUB_ENV
              echo "environment=production" >> $GITHUB_OUTPUT
            else
              echo "CLOUDFLARE_ENV=staging" >> $GITHUB_ENV
              echo "environment=staging" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "CLOUDFLARE_ENV=" >> $GITHUB_ENV
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "CLOUDFLARE_ENV=staging" >> $GITHUB_ENV
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare (${{ steps.set-env.outputs.environment }})
        run: CLOUDFLARE_ENV=${{ env.CLOUDFLARE_ENV }} pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          NODE_ENV: production # should always be production for both staging and production environments because it controls Node.js/Next.js optimizations (minification, tree-shaking, etc.), not which infrastructure you're deploying to. The environment separation is handled by CLOUDFLARE_ENV
